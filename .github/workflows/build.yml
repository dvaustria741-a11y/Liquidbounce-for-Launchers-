name: Build Jar

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download upstream LiquidBounce source
        run: |
          curl -L --retry 3 -o source.zip             "https://github.com/CCBlueX/LiquidBounce/archive/e77a6699123fad2e2d50748c0c7f764932bb0b13.zip"
          unzip -q source.zip
          rsync -a --exclude=".git"             --exclude="src/main/kotlin/net/ccbluex/liquidbounce/integration/backend/BrowserBackendManager.kt"             --exclude="src/main/kotlin/net/ccbluex/liquidbounce/integration/backend/backends/cef/CefBrowserBackend.kt"             --exclude="src/main/kotlin/net/ccbluex/liquidbounce/integration/task/TaskProgressScreen.kt"             LiquidBounce-e77a6699123fad2e2d50748c0c7f764932bb0b13/ .
          rm -rf LiquidBounce-e77a6699123fad2e2d50748c0c7f764932bb0b13 source.zip

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build remapped jar
        run: ./gradlew remapJar --no-daemon

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: liquidbounce-launcher-build
          path: build/libs/*-remapped.jar
          if-no-files-found: warn
