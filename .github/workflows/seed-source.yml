name: Seed Source Tree
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/seed-source.yml"

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download upstream source zip
        run: |
          curl -L --retry 3 -o source.zip \
            "https://github.com/CCBlueX/LiquidBounce/archive/e77a6699123fad2e2d50748c0c7f764932bb0b13.zip"
          unzip -q source.zip

      - name: Copy source tree (keep our fixes)
        run: |
          rsync -a --exclude=".git" \
            --exclude="src/main/kotlin/net/ccbluex/liquidbounce/integration/backend/BrowserBackendManager.kt" \
            --exclude="src/main/kotlin/net/ccbluex/liquidbounce/integration/backend/backends/cef/CefBrowserBackend.kt" \
            --exclude="src/main/kotlin/net/ccbluex/liquidbounce/integration/task/TaskProgressScreen.kt" \
            LiquidBounce-e77a6699123fad2e2d50748c0c7f764932bb0b13/ .
          rm -rf LiquidBounce-e77a6699123fad2e2d50748c0c7f764932bb0b13 source.zip

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "chore: seed full LiquidBounce source tree (e77a669) — mobile launcher fixes preserved" || echo "Nothing to commit"
          git push
